<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESH // UNIFIED WORKSPACE</title>
    
    <!-- CSS Externe -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Bibliothèques Externes -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-actions">
            <button class="btn-reset-global" onclick="resetNetworkFeed()">Reset Global</button>
            <button class="btn-header" onclick="generateAdminKeyFile()">Générer Clé Admin</button>
            <label class="btn-header" id="adminBtn">
                <span id="adminBtnText">Importer Clé (.json)</span>
                <input type="file" id="keyFileInput" accept=".json" style="display:none;" onchange="importAdminKeyFile(this)">
            </label>
            <input type="text" id="usernameInput" value="Anonyme" maxlength="12">
        </div>
    </header>

    <!-- Contenu Principal -->
    <div class="main-container">
        <div class="feed-container">
            <div class="posts-list" id="globalFeed"></div>
            <div class="composer">
                <input type="text" id="postText" placeholder="Écrire un message...">
                <button onclick="publishNewPost()">Envoyer</button>
            </div>
        </div>

        <!-- Panneaux (Thread & IDE) -->
        <div class="side-panel" id="threadPanel">
            <div id="threadFeed"></div>
            <input type="text" id="replyText" placeholder="Répondre...">
            <button onclick="publishNewReply()">Répondre</button>
        </div>

        <div class="side-panel" id="idePanel">
            <select id="ideLang" onchange="adaptTemplateLanguage()">
                <option value="javascript">JS</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
            </select>
            <textarea id="ideSource"></textarea>
            <button onclick="executeCompiler()">Exécuter</button>
            <div id="consoleOutput"></div>
            <iframe id="htmlPreview"></iframe>
        </div>
    </div>

    <!-- Chargement du module principal -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
