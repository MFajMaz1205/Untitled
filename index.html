<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UntitledThreads</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #06070d; --surface: rgba(20, 22, 37, 0.6); --border: rgba(255, 255, 255, 0.08); --text-main: #f1f3f9; --text-muted: #767c98; --accent: #86e1fc; --danger: #ff5a79; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: flex-end; align-items: center; height: 54px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-header { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .feed-container { flex: 1; display: grid; grid-template-rows: 1fr auto; height: 100%; }
        .posts-list { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .composer { padding: 12px; border-top: 1px solid var(--border); }
        .message-bar { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 22px; display: flex; align-items: center; padding: 4px 8px; }
        .message-input { flex: 1; background: none; border: none; color: #fff; padding: 0 10px; height: 36px; outline: none; }
        .ide-panel { width: 450px; border-left: 1px solid var(--border); background: #08090f; display: none; flex-direction: column; }
        .ide-panel.open { display: flex; }
        .ide-textarea { flex: 1; background: #05060a; color: #a6e3a1; border: none; padding: 10px; resize: none; font-family: monospace; outline: none; }
        .ide-btn { background: var(--accent); color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <button class="btn-header" onclick="showShareModal()"><i data-lucide="share-2"></i></button>
            <input type="text" id="usernameInput" value="Anonyme" style="background:none; border:1px solid var(--border); color:#fff; border-radius:20px; padding:5px 15px; width:100px;">
        </div>
    </header>

    <div class="main-container">
        <div class="feed-container">
            <div class="posts-list" id="globalFeed"></div>
            <div class="composer">
                <div class="message-bar">
                    <button class="bar-btn" onclick="openIDE()"><i data-lucide="code"></i></button>
                    <input type="text" id="postText" class="message-input" placeholder="Message...">
                    <button class="bar-btn" onclick="publishNewPost()"><i data-lucide="arrow-right"></i></button>
                </div>
            </div>
        </div>
        <div class="ide-panel" id="idePanel">
            <select id="ideLang"><option value="javascript">JS</option><option value="python">Python</option></select>
            <textarea id="ideSource"></textarea>
            <button class="ide-btn" onclick="executeCompiler()">Exécuter</button>
            <div id="consoleOutput" style="color:#38bdf8; padding:10px; font-family:monospace; height:100px; overflow-y:auto;">> Prêt...</div>
        </div>
    </div>

    <div id="shareModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="event.stopPropagation()">
            <h3 style="color:#000; margin-bottom:15px;">Scanner pour partager</h3>
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const postsNode = gun.get('mesh-posts-v5');
        let pyodideInstance = null;

        function openIDE() { document.getElementById('idePanel').classList.add('open'); }
        
        async function executeCompiler() {
            const lang = document.getElementById('ideLang').value;
            const code = document.getElementById('ideSource').value;
            const out = document.getElementById('consoleOutput');
            if (lang === 'python') {
                if (!pyodideInstance) pyodideInstance = await loadPyodide();
                try { out.innerText = await pyodideInstance.runPythonAsync(code); } 
                catch(e) { out.innerText = "Erreur: " + e; }
            } else {
                try { out.innerText = eval(code); } 
                catch(e) { out.innerText = "Erreur: " + e; }
            }
        }

        const qrcode = new QRCode("qrcode", { text: "https://mfajmaz1205.github.io/Untitled/", width: 200, height: 200 });
        function showShareModal() { document.getElementById('shareModal').style.display = 'flex'; }

        function publishNewPost() {
            const text = document.getElementById('postText').value;
            postsNode.set({ text, timestamp: Date.now() });
            document.getElementById('postText').value = "";
        }

        postsNode.map().on((data) => {
            if(!data) return;
            const div = document.createElement('div');
            div.className = "post-card";
            div.innerText = data.text;
            document.getElementById('globalFeed').prepend(div);
        });

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
