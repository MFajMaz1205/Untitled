<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESH // UNIFIED WORKSPACE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js" defer></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="header-actions">
            <button class="btn-reset-global" onclick="resetNetworkFeed()"><i data-lucide="trash-2"></i></button>
            <input type="text" id="usernameInput" value="Anonyme" maxlength="12">
        </div>
    </header>

    <div class="main-container">
        <!-- Feed -->
        <div class="feed-container">
            <div class="posts-list" id="globalFeed"></div>
            <div class="composer">
                <div class="message-bar">
                    <button class="bar-btn" onclick="openIDE()"><i data-lucide="code"></i></button>
                    <input type="text" id="postText" class="message-input" placeholder="Écrire un message...">
                    <button class="bar-btn btn-send" onclick="publishNewPost()"><i data-lucide="arrow-right"></i></button>
                </div>
            </div>
        </div>

        <!-- IDE -->
        <div class="ide-panel" id="idePanel" style="display:none;">
            <div class="panel-header">
                <select id="ideLang"><option value="javascript">JS</option><option value="python">Python</option></select>
                <button onclick="closeIDE()"><i data-lucide="x"></i></button>
            </div>
            <textarea id="ideSource"></textarea>
            <button class="ide-btn" onclick="executeCompiler()">Exécuter</button>
            <div id="consoleOutput"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = () => { if(typeof lucide !== 'undefined') lucide.createIcons(); };
    </script>
</body>
</html>
