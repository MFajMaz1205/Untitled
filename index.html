<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UntitledThreads</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --bg: #06070d; --surface: rgba(20, 22, 37, 0.6); --border: rgba(255, 255, 255, 0.08); --text-main: #f1f3f9; --text-muted: #767c98; --accent: #86e1fc; --accent-gradient: linear-gradient(135deg, #86e1fc, #4f46e5); --code-bg: #090a10; --danger: #ff5a79; --admin-color: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, rgba(79, 70, 229, 0.15), transparent 50%); }
        header { background: rgba(6, 7, 13, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: flex-end; align-items: center; z-index: 10; height: 54px; flex-shrink: 0; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-header { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .is-admin { border-color: var(--admin-color); color: var(--admin-color); }
        .btn-delete-post { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: none; }
        body.admin-mode .btn-delete-post { display: block; }
        .main-container { flex: 1; display: flex; width: 100%; height: calc(100vh - 54px); overflow: hidden; }
        .feed-container { flex: 1; display: grid; grid-template-rows: 1fr auto; height: 100%; }
        .posts-list { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .post-card { background: var(--surface); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 14px; padding: 14px; position: relative; }
        .composer { padding: 12px 14px; background: #06070d; border-top: 1px solid var(--border); }
        .message-bar { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 22px; display: flex; align-items: center; padding: 4px 8px; gap: 6px; }
        .bar-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; width: 38px; height: 38px; }
        .btn-send { background: var(--accent-gradient); color: #fff; width: 34px; height: 34px; border-radius: 50%; }
        .message-input { flex: 1; background: none; border: none; color: #fff; font-size: 14px; outline: none; padding-left: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <button id="adminBtn" class="btn-header" onclick="claimAdmin()">
                <i data-lucide="shield"></i> <span id="adminBtnText">Devenir Admin</span>
            </button>
            <input type="text" id="usernameInput" value="Anonyme" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; border-radius:20px; padding:6px 14px; width:100px; text-align:center;">
        </div>
    </header>

    <div class="main-container">
        <div class="feed-container">
            <div class="posts-list" id="globalFeed"></div>
            <div class="composer">
                <div class="message-bar">
                    <button class="bar-btn"><i data-lucide="code"></i></button>
                    <input type="text" id="postText" class="message-input" placeholder="Message...">
                    <button class="bar-btn btn-send" onclick="publishNewPost()"><i data-lucide="arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const postsNode = gun.get('mesh-posts-v5');
        const adminRegistry = gun.get('mesh-admin-registry');
        
        let isAdminActive = false;

        // Élection Admin "Premier Arrivé"
        async function claimAdmin() {
            adminRegistry.once(async (data) => {
                if (data && data.pub) return alert("❌ Admin déjà en place.");
                const pair = await Gun.SEA.pair();
                adminRegistry.put({ pub: pair.pub });
                localStorage.setItem('mesh_secret_admin_key', pair.priv);
                localStorage.setItem('mesh_pub_admin_key', pair.pub);
                location.reload();
            });
        }

        // Vérification statut
        adminRegistry.on((data) => {
            const localPub = localStorage.getItem('mesh_pub_admin_key');
            if (data && data.pub === localPub) {
                isAdminActive = true;
                document.body.classList.add('admin-mode');
                document.getElementById('adminBtn').classList.add('is-admin');
                document.getElementById('adminBtnText').innerText = "Admin Actif";
            }
        });

        function publishNewPost() {
            const text = document.getElementById('postText').value;
            if(!text) return;
            postsNode.set({ text, author: document.getElementById('usernameInput').value, timestamp: Date.now() });
            document.getElementById('postText').value = "";
        }

        function deletePost(id) {
            if(isAdminActive) postsNode.get(id).put(null);
        }

        postsNode.map().on((post, id) => {
            if(!post) return document.getElementById(id)?.remove();
            let div = document.getElementById(id) || document.createElement('div');
            div.id = id; div.className = "post-card";
            div.innerHTML = `<div>${post.text}</div><button class="btn-delete-post" onclick="deletePost('${id}')"><i data-lucide="trash-2"></i></button>`;
            document.getElementById('globalFeed').prepend(div);
            lucide.createIcons();
        });

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
